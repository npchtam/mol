name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"   # редкий fallback (раз в 3 часа)

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-chain
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          New-Item -ItemType Directory -Path C:\9Hits -Force

      # 📦 КЭШ
      - name: Cache ZIPs
        uses: actions/cache@v4
        with:
          path: |
            C:\9Hits\hits.zip
            C:\9Hits\9hits-app-state.zip
          key: zips-v1

      # ⬇️ скачивание только при отсутствии
      - name: Download hits.zip if not cached
        run: |
          if (!(Test-Path "C:\9Hits\hits.zip")) {
            Invoke-WebRequest "http://criptober.com/hits_criptober.com.zip" -OutFile "C:\9Hits\hits.zip"
          }

      - name: Download state if not cached
        run: |
          if (!(Test-Path "C:\9Hits\9hits-app-state.zip")) {
            Invoke-WebRequest "https://files.catbox.moe/46rbpt.zip" -OutFile "C:\9Hits\9hits-app-state.zip"
          }

      - name: Setup 9Hits
        run: |
          $exe = Get-ChildItem C:\9Hits -Recurse -Filter "9hits.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (!$exe) {
            Expand-Archive "C:\9Hits\hits.zip" C:\9Hits -Force
          }

      - name: Restore 9Hits state
        run: |
          Remove-Item "$env:LOCALAPPDATA\9hits-app" -Recurse -Force -ErrorAction SilentlyContinue

          $local="$env:LOCALAPPDATA\9hits-app"
          New-Item $local -ItemType Directory -Force

          $tmp="C:\9Hits\temp"
          New-Item $tmp -ItemType Directory -Force

          Expand-Archive "C:\9Hits\9hits-app-state.zip" $tmp -Force

          if (Test-Path "$tmp\9hits-app") {
            Copy-Item "$tmp\9hits-app\*" $local -Recurse -Force
          } else {
            Copy-Item "$tmp\*" $local -Recurse -Force
          }

          Remove-Item $tmp -Recurse -Force

      # 🔥 ЗАПУСК С КОНТРОЛЕМ (ТИХИЙ)
      - name: Run process
        run: |
          $exe = Get-ChildItem C:\9Hits -Recurse -Filter "9hits.exe" | Select-Object -First 1

          if (!$exe) { exit 1 }

          $exePath = $exe.FullName
          $proc = $null

          # ~2 часа
          $end = (Get-Date).AddMinutes(115)

          try {
            while ((Get-Date) -lt $end) {

              if (!$proc -or $proc.HasExited) {
                $proc = Start-Process $exePath -PassThru
              }

              Start-Sleep 20
            }
          }
          catch {}
          finally {
            if ($proc -and !$proc.HasExited) {
              try {
                $proc.CloseMainWindow() | Out-Null
                Start-Sleep 5
              } catch {}

              if (!$proc.HasExited) {
                $proc.Kill()
              }
            }
          }

      # 🔁 МЯГКИЙ САМОПЕРЕЗАПУСК
      - name: Trigger next run
        if: always()
        run: |
          Start-Sleep 60

          $body = @{
            ref = "main"
          } | ConvertTo-Json

          Invoke-RestMethod `
            -Method POST `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/CI.yml/dispatches" `
            -Headers @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github+json"
            } `
            -Body $body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📊 СТАТИСТИКА (редкая)
      - name: Resource usage summary
        if: always()
        run: |
          $cpuSamples=Get-Counter "\Processor(_Total)\% Processor Time" -SampleInterval 1 -MaxSamples 3
          $vals=$cpuSamples.CounterSamples | ForEach-Object {$_.CookedValue}

          $cpuAvg=[math]::Round(($vals|Measure-Object -Average).Average,1)
          $memFree=(Get-Counter "\Memory\Available MBytes").CounterSamples.CookedValue

          Write-Host "CPU $cpuAvg% | Free RAM $memFree MB"
